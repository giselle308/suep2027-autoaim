# YOLO + color filter configuration
# This file controls runtime parameters for cgraph_camera_detector.

yolo:
  model_path: model/last.xml
  device: CPU
  # <=0 means infer from model output channels
  num_classes: 0
  conf_thres: 0.20
  nms_thres: 0.25
  # thread_num is clamped to >= 2
  thread_num: 4
  # infer_workers is clamped to [1, 2]
  infer_workers: 2
  # supported: red | blue
  target_color: red

color_filter:
  # Per-box resize cap to bound CPU cost under many detections
  roi_max_side: 100
  # Binary threshold for bright color channel (0-255)
  bright_threshold: 80
  # Binary threshold for color dominance map (0-255)
  dominance_threshold: 12
  # Minimum colored pixel ratio inside ROI
  min_color_ratio: 0.005
  # Ratio needed to decide red vs blue dominance
  dominance_ratio: 1.0
  # Morph open kernel size (odd number recommended)
  morph_kernel: 3
  # Lightweight prefilter before binary refinement (latency oriented)
  fast_roi_max_side: 48
  fast_bright_threshold: 90
  fast_dominance_threshold: 8
  fast_dominance_ratio: 1.08

debug:
  # true: generate and send visualization frames for foxglove
  # false: normal run without visualization rendering
  foxglove_enable: false
  
logging:
  # trace | debug | info | warn | error | critical | off
  level: info
  # log level that triggers immediate flush
  flush_level: warn
  # async queue size (>=1024)
  queue_size: 8192
  # async worker threads (>=1)
  thread_count: 1
  # overrun_oldest | block
  overflow_policy: overrun_oldest
  # true: print per-infer-node YOLO infer FPS logs
  infer_fps_enable: true
  # true: print end-to-end FPS and latency logs
  e2e_enable: true
  # spdlog pattern
  pattern: "[%Y-%m-%d %H:%M:%S.%e] [%^%l%$] [tid %t] %v"
