# YOLO + color filter configuration
# This file controls runtime parameters for cgraph_camera_detector.

yolo:
  model_path: model/last.xml
  device: CPU
  # <=0 means infer from model output channels
  num_classes: 2
  conf_thres: 0.20
  nms_thres: 0.25
  # FastNMS: keep only the top-K scoring boxes before NMS. <=0 disables the cap.
  fast_nms_topk: 200
  # thread_num covers long-running CGraph nodes: camera + async_infer + pnp + display.
  thread_num: 4
  # Number of OpenVINO async InferRequest slots inside the single async_infer node.
  # Values above 2 may improve throughput but can increase latency/resource use.
  infer_workers: 3
  # Only evaluate color on the top-K post-NMS boxes to bound target-hit latency.
  max_color_candidates: 8
  # EMA filter for detected armor corner points before display and PnP.
  # alpha closer to 1.0 is more responsive; closer to 0.0 is smoother.
  ema_enable: true
  ema_alpha: 0.45
  ema_reset_frame_gap: 10
  # supported: red | blue
  target_color: red

pnp:
  enable: true
  # Physical armor size in meters.
  # Detected points are ordered lightbar endpoints:
  # left-top -> right-top -> right-bottom -> left-bottom.
  small_armor_width_m: 0.137
  big_armor_width_m: 0.230
  armor_length_m: 0.125
  lightbar_length_m: 0.057
  # Rigid pose validation: reject PnP results whose fixed 3D armor rectangle
  # cannot reproject tightly onto detected image corners.
  rigid_constraint_enable: true
  max_mean_reprojection_error_px: 4.0
  max_corner_reprojection_error_px: 8.0
  min_depth_m: 0.05
  max_depth_m: 20.0

debug:
  # true: generate and send visualization frames for foxglove
  # false: normal run without visualization rendering
  foxglove_enable: false

profiling:
  # true: print per-stage timing logs for performance tuning
  enable: true
  # profiling summary interval in milliseconds
  interval_ms: 1000
  
logging:
  # trace | debug | info | warn | error | critical | off
  level: info
  # log level that triggers immediate flush
  flush_level: warn
  # async queue size (>=1024)
  queue_size: 8192
  # async worker threads (>=1)
  thread_count: 1
  # overrun_oldest | block
  overflow_policy: overrun_oldest
  # true: print total FPS, end-to-end latency, and det count logs
  e2e_enable: true
  # spdlog pattern
  pattern: "[%Y-%m-%d %H:%M:%S.%e] [%^%l%$] [tid %t] %v"
